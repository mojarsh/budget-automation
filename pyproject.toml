[project]
name = "budget-automation"
version = "0.1.0"
description = ""
authors = [{ name = "Your Name", email = "you@example.com" }]
requires-python = ">=3.12"
readme = "README.md"
dependencies = [
    "cachetools==5.3.2",
    "certifi==2023.11.17",
    "charset-normalizer==3.3.2",
    "google-auth==2.25.2",
    "google-auth-oauthlib==1.2.0",
    "gspread==5.12.3",
    "idna==3.6",
    "numpy==1.26.2",
    "oauthlib==3.2.2",
    "pandas==2.1.4",
    "pyasn1==0.5.1",
    "pyasn1-modules==0.3.0",
    "python-dateutil==2.8.2",
    "python-dotenv==1.0.0",
    "pytz==2023.3.post1",
    "requests==2.31.0",
    "requests-oauthlib==1.3.1",
    "rsa==4.9",
    "six==1.16.0",
    "tzdata==2023.3",
    "urllib3==2.1.0",
]

[dependency-groups]
test = [
    "coverage>=7.6.1,<8",
    "pytest>=8.3.3,<9",
]
dev = ["black>=24.8.0,<25"]

[tool.uv]
default-groups = [
    "test",
    "dev",
]
[tool.hatch.build.targets.wheel]
packages = ["src/budget_automation"]
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
